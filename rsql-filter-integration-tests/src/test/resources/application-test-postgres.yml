spring:
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///rsql_filter_it
    username: test
    password: test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        show_sql: false
  liquibase:
    enabled: false
